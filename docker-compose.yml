version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: dealership_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: dealership
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dealership_backend
    restart: always
    environment:
      PORT: 5000
      DATABASE_URL: postgresql://postgres:postgrespassword@db:5432/dealership?schema=public
      JWT_ACCESS_SECRET: default_super_secret_access_key_2026
      JWT_REFRESH_SECRET: default_super_secret_refresh_key_2026
      NODE_ENV: production
      CORS_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dealership_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
